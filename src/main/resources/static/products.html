<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product Manager</title>

<style>

body{
font-family:Arial;
margin:40px;
}

input{
padding:6px;
margin:5px;
}

table{
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #ccc;
padding:8px;
}

</style>

</head>

<body>

<h2>Product Manager</h2>

<h3>Add Product</h3>

<input id="name" placeholder="Name">
<input id="barcode" placeholder="Barcode">
<input id="price" placeholder="Price">
<input id="stock" placeholder="Stock">

<button onclick="addProduct()">Add</button>

<h3>Product List</h3>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Barcode</th>
<th>Price</th>
<th>Stock</th>
</tr>
</thead>

<tbody id="productTable"></tbody>

</table>

<script>

function loadProducts(){

fetch("/products")
.then(res=>res.json())
.then(data=>{

let html=""

data.forEach(p=>{

html+=`
<tr>
<td>${p.id}</td>
<td>${p.name}</td>
<td>${p.barcode}</td>
<td>${p.price}</td>
<td>${p.stockQuantity}</td>
</tr>
`

})

document.getElementById("productTable").innerHTML=html

})

}

function addProduct(){

let product={

name:document.getElementById("name").value,
barcode:document.getElementById("barcode").value,
price:document.getElementById("price").value,
stockQuantity:document.getElementById("stock").value

}

fetch("/products",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(product)

})
.then(res=>res.json())
.then(data=>{
loadProducts()
})

}

loadProducts()

</script>

</body>
</html>
