<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Báo cáo tồn kho</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/sidebar.css">
<script src="https://unpkg.com/html5-qrcode"></script>
<style>

body{
background:#f8f9fa;
font-family:Inter,sans-serif;
}

.main-content{
margin-left:240px;
padding:30px;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 4px 6px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div id="sidebar"></div>

<div class="main-content">

<h3 class="fw-bold mb-4">
<i class="fa-solid fa-warehouse"></i> Báo cáo tồn kho
</h3>

<div class="card p-4">

<h5 class="mb-3">Danh sách tồn kho</h5>
<div class="card p-3 mb-3">

<div class="row align-items-end g-2">

<div class="col-md-3">
<label class="form-label fw-bold">Tìm sản phẩm</label>
<input class="form-control" id="search" placeholder="Nhập tên sản phẩm">
</div>

<div class="col-md-2">
<label class="form-label fw-bold">Trạng thái</label>
<select id="filterStock" class="form-select">
<option value="">Tất cả</option>
<option value="low">Sắp hết</option>
<option value="out">Hết hàng</option>
</select>
</div>

<div class="col-md-2">
<label class="form-label fw-bold">Làm mới</label>
<button class="btn btn-secondary w-100" onclick="resetFilter()">
<i class="fa fa-rotate"></i> Làm mới
</button>
</div>

<div class="col-md-2">
<label class="form-label fw-bold">Quét barcode</label>
<button class="btn btn-success w-100" onclick="startScanner()">
<i class="fa fa-barcode"></i> Quét mã
</button>
</div>

</div>

<div class="mt-3">

<div id="reader" style="width:320px; display:none;"></div>

<button class="btn btn-danger btn-sm mt-2" onclick="stopScanner()" id="stopBtn" style="display:none">
<i class="fa fa-stop"></i> Dừng quét
</button>

</div>

</div>
<div class="table-responsive">

<table class="table table-hover">

<thead>
<tr>
<th>ID</th>
<th>Sản phẩm</th>
<th>Danh mục</th>
<th>Giá nhập</th>
<th>Giá bán</th>
<th>Tồn kho</th>
<th>Tồn tối thiểu</th>
<th>Trạng thái</th>
</tr>
</thead>

<tbody id="stockTable"></tbody>

</table>

</div>

</div>

</div>

<script>
let currentPage = 1;
const pageSize = 10; // số sản phẩm mỗi trang
let stockData=[]

function formatMoney(v){
return Number(v).toLocaleString("vi-VN") + " đ"
}

function loadStock(){

fetch("/api/reports/stock")
.then(res=>res.json())
.then(data=>{

stockData = data
renderStock()

})

}
function resetFilter(){

// xóa ô tìm kiếm
document.getElementById("search").value = ""

// reset filter
document.getElementById("filterStock").value = ""

// render lại bảng
renderStock()

}
function renderStock() {
    let search = document.getElementById("search").value.toLowerCase();
    let filter = document.getElementById("filterStock").value;

    // lọc dữ liệu theo tìm kiếm + filter
    let filteredData = stockData.filter(p => {
        if (search && !p.name.toLowerCase().includes(search)) return false;
        let type = "ok";
        if (p.stock_quantity <= 0) type = "out";
        else if (p.stock_quantity <= p.min_stock) type = "low";
        if (filter && filter !== type) return false;
        return true;
    });

    // tính tổng trang
    const totalPages = Math.ceil(filteredData.length / pageSize);

    // lấy dữ liệu cho trang hiện tại
    const start = (currentPage - 1) * pageSize;
    const end = start + pageSize;
    const pageData = filteredData.slice(start, end);

    let rows = "";
    pageData.forEach(p => {
        let status = "";
        let rowClass = "";
        let type = "ok";
        if (p.stock_quantity <= 0) { status = '<span class="badge bg-danger">Hết hàng</span>'; rowClass="table-danger"; type="out"; }
        else if (p.stock_quantity <= p.min_stock) { status = '<span class="badge bg-warning text-dark">Sắp hết</span>'; rowClass="table-warning"; type="low"; }
        else { status = '<span class="badge bg-success">Còn hàng</span>'; }

        rows += `
        <tr class="${rowClass}">
            <td>${p.id}</td>
            <td><b>${p.name}</b></td>
            <td>${p.category ?? ""}</td>
            <td>${formatMoney(p.cost_price)}</td>
            <td>${formatMoney(p.price)}</td>
            <td><b>${p.stock_quantity}</b></td>
            <td>${p.min_stock}</td>
            <td>${status}</td>
        </tr>`;
    });

    document.getElementById("stockTable").innerHTML = rows;

    renderPagination(totalPages);
}

function renderPagination(totalPages) {
    let pagination = document.getElementById("pagination");
    if (!pagination) {
        const div = document.createElement("div");
        div.id = "pagination";
        div.className = "mt-3 d-flex flex-wrap align-items-center";
        document.querySelector(".table-responsive").appendChild(div);
        pagination = div;
    }

    if (totalPages <= 1) {
        pagination.innerHTML = "";
        return;
    }

    let html = "";

    // Nút Prev
    html += `<button class="btn btn-sm me-1 mb-1 ${currentPage === 1 ? 'btn-secondary disabled' : 'btn-outline-primary'}" onclick="goToPage(${currentPage-1})">&laquo; Prev</button>`;

    // Xác định dải hiển thị (ví dụ 5 nút)
    const maxButtons = 5;
    let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
    let endPage = Math.min(totalPages, startPage + maxButtons - 1);

    // Nếu dải nhỏ hơn maxButtons, kéo startPage lên
    startPage = Math.max(1, endPage - maxButtons + 1);

    for (let i = startPage; i <= endPage; i++) {
        html += `<button class="btn btn-sm me-1 mb-1 ${i === currentPage ? 'btn-primary' : 'btn-outline-primary'}" onclick="goToPage(${i})">${i}</button>`;
    }

    // Nút Next
    html += `<button class="btn btn-sm me-1 mb-1 ${currentPage === totalPages ? 'btn-secondary disabled' : 'btn-outline-primary'}" onclick="goToPage(${currentPage+1})">Next &raquo;</button>`;

    pagination.innerHTML = html;
}

function goToPage(page) {
    currentPage = page;
    renderStock();
}
document.getElementById("search").addEventListener("keyup", () => { currentPage=1; renderStock(); });
document.getElementById("filterStock").addEventListener("change", () => { currentPage=1; renderStock(); });
loadStock()

</script>
<script>
    let scanner

function startScanner(){

document.getElementById("reader").style.display = "block"
document.getElementById("stopBtn").style.display = "inline-block"

scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode: "environment" },
{
fps: 10,
qrbox: { width: 250, height: 120 }
},
barcode => {

findProductByBarcode(barcode)
stopScanner()

},
error => {}
)

}

function stopScanner(){

if(scanner){
scanner.stop()
}

document.getElementById("reader").style.display = "none"
document.getElementById("stopBtn").style.display = "none"

}

function findProductByBarcode(barcode){

// tìm trong dữ liệu tồn kho
let product = stockData.find(p => p.barcode === barcode)

if(!product){

alert("Không tìm thấy sản phẩm")
return

}

// tự điền ô tìm kiếm
document.getElementById("search").value = product.name

// render lại bảng
renderStock()

}
</script>
<script src="/js/sidebar.js"></script>


</body>
</html>
