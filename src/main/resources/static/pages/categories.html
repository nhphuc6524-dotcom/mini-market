<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý danh mục</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/sidebar.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>

body{
background:#f8f9fa;
font-family:Inter,sans-serif;
}

.main-content{
margin-left:240px;
padding:30px;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 4px 6px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div id="sidebar"></div>

<div class="main-content">

<h3 class="fw-bold mb-4">
<i class="fa-solid fa-layer-group"></i> Quản lý danh mục
</h3>

<div class="row">

<!-- FORM -->
<div class="col-md-4">

<div class="card p-4">

<h5 class="mb-3">Thêm danh mục</h5>

<input type="hidden" id="id">

<div class="mb-3">
<label>Tên danh mục</label>
<input class="form-control" id="name">
</div>

<div class="mb-3">
<label>Mô tả</label>
<textarea class="form-control" id="description"></textarea>
</div>

<div class="d-grid gap-2">

<button class="btn btn-primary" onclick="saveCategory()">
<i class="fa fa-save"></i> Lưu
</button>

<button class="btn btn-secondary" onclick="clearForm()">
Làm mới
</button>

</div>

</div>

</div>

<!-- TABLE -->
<div class="col-md-8">

<div class="card p-4">

<h5 class="mb-3 d-flex justify-content-between align-items-center">
    Danh sách danh mục
    <button class="btn btn-success" onclick="exportCategoriesExcel()">
        <i class="fa-solid fa-file-excel"></i> Xuất Excel
    </button>
</h5>
<div class="table-responsive">

<table class="table table-hover">

<thead>
<tr>
<th>ID</th>
<th>Tên</th>
<th>Mô tả</th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>
<div class="d-flex justify-content-end align-items-center mt-3">

<button class="btn btn-sm btn-light me-2" onclick="prevPage()">
Previous
</button>

<span id="pageInfo" class="fw-semibold"></span>

<button class="btn btn-sm btn-light ms-2" onclick="nextPage()">
Next
</button>

</div>
</div>

</div>

</div>

</div>

</div>

<script>
let categories = []
let currentPage = 1
let rowsPerPage = 8

const api="/api/categories"

function loadCategories(){

fetch(api)
.then(res=>res.json())
.then(data=>{

categories = data
currentPage = 1
displayCategories()

})

}

function displayCategories(){

let start = (currentPage - 1) * rowsPerPage
let end = start + rowsPerPage

let pageItems = categories.slice(start, end)

let rows=""

pageItems.forEach(c=>{

rows+=`

<tr>

<td>${c.id}</td>
<td>${c.name}</td>
<td>${c.description ?? ""}</td>

<td>

<button class="btn btn-sm btn-light"
onclick="editCategory(${c.id})">

<i class="fa fa-edit"></i>

</button>

<button class="btn btn-sm btn-danger"
onclick="deleteCategory(${c.id})">

<i class="fa fa-trash"></i>

</button>

</td>

</tr>

`

})

document.getElementById("tableBody").innerHTML=rows

let totalPages = Math.ceil(categories.length / rowsPerPage)

document.getElementById("pageInfo").innerText =
`Page ${currentPage} / ${totalPages}`

}

function saveCategory(){

let id=document.getElementById("id").value

let category={

name:document.getElementById("name").value,
description:document.getElementById("description").value

}

if(id){

fetch(api+"/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(category)
}).then(()=>{
loadCategories()
clearForm()
})

}else{

fetch(api,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(category)
}).then(()=>{
loadCategories()
clearForm()
})

}

}

function editCategory(id){

fetch(api+"/"+id)
.then(res=>res.json())
.then(c=>{

document.getElementById("id").value=c.id
document.getElementById("name").value=c.name
document.getElementById("description").value=c.description

})

}

function nextPage(){

if(currentPage * rowsPerPage < categories.length){

currentPage++
displayCategories()

}

}

function prevPage(){

if(currentPage > 1){

currentPage--
displayCategories()

}

}

function deleteCategory(id){

if(confirm("Xóa danh mục?")){

fetch(api+"/"+id,{
method:"DELETE"
}).then(()=>loadCategories())

}

}

function clearForm(){

document.getElementById("id").value=""
document.getElementById("name").value=""
document.getElementById("description").value=""

}

loadCategories()
function exportCategoriesExcel() {
    if(categories.length === 0){
        alert("Không có danh mục để xuất.");
        return;
    }

    // Chuẩn bị dữ liệu
    const data = categories.map(c => ({
        ID: c.id,
        Tên: c.name,
        Mô_tả: c.description || ""
    }));

    // Tạo worksheet
    const ws = XLSX.utils.json_to_sheet(data, {header: ["ID", "Tên", "Mô_tả"]});

    // Style header (in đậm, màu nền xanh)
    const range = XLSX.utils.decode_range(ws['!ref']);
    for(let C = range.s.c; C <= range.e.c; ++C){
        const cell_address = {c:C, r:0};
        const cell_ref = XLSX.utils.encode_cell(cell_address);
        if(!ws[cell_ref]) continue;
        ws[cell_ref].s = {
            font: {bold:true, color: {rgb: "FFFFFF"}},
            fill: {fgColor: {rgb:"4f46e5"}},
            alignment: {horizontal:"center"}
        };
    }

    // Tạo workbook và append sheet
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Danh mục");

    // Xuất file
    XLSX.writeFile(wb, "Danh_sach_danh_muc.xlsx");
}
</script>

<script src="/js/sidebar.js"></script>
<script src="/js/auth.js"></script>
<script>
    // Ví dụ: Chỉ cho phép ADMIN vào trang này
    authGuard(["ADMIN"]); 
</script>
</body>
</html>
