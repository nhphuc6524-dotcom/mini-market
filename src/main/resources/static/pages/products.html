<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mini Market - Quản trị hệ thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/sidebar.css">
    <script src="/js/auth.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #334155; }
        .main-content { margin-left: 240px; padding: 2rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .table thead { background-color: #f1f5f9; }
        .form-control { border-radius: 8px; padding: 10px; border: 1px solid #e2e8f0; }
        .btn-primary { background: #4f46e5; border: none; padding: 10px 20px; }
        .btn-primary:hover { background: #4338ca; }
        .stock-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; }
        table td{
        white-space: nowrap;
        vertical-align: middle;
        }
        /* Input tiền lớn hơn */
        .money-input {
            font-size: 1rem;      /* cỡ chữ lớn hơn */
            height: 42px;         /* chiều cao input */
            padding: 0 10px;      /* padding trái phải */
            text-align: right;    /* căn phải cho tiền */
        }
        .input-group .input-group-text {
            font-size: 1rem;
            height: 42px;
        }
        #scanner{
        width:350px;
        margin-top:10px;
        border-radius:10px;
        overflow:hidden;
        border:1px solid #ddd;
        display:none;
        }
    </style>
</head>
<body>

<div id="sidebar"></div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Quản lý kho hàng</h3>
        
    </div>

    <div class="row">
        <!-- FORM THÊM SẢN PHẨM -->
            <div class="col-12">
    <div class="card p-4 mb-4">
        <h5 class="fw-bold mb-3">
            <i class="fa-solid fa-circle-plus me-2 text-primary"></i>
            Thông tin sản phẩm
        </h5>

        <input type="hidden" id="id">

        <div class="row g-3">
            <div class="col-md-4 d-flex flex-column gap-2">
                <div>
                    <label class="form-label small fw-semibold mb-1">Tên sản phẩm</label>
                    <input class="form-control" id="name" placeholder="Nhập tên sản phẩm...">
                </div>
                <div>
                    <label class="form-label small fw-semibold mb-1">Barcode</label>
                    <input class="form-control bg-light" id="barcode" readonly>
                </div>
            </div>

            <div class="col-md-2 d-flex flex-column gap-2">
                <div>
                    <label class="form-label small fw-semibold mb-1">Danh mục</label>
                    <select class="form-control" id="category"></select>
                </div>
                <div>
                    <label class="form-label small fw-semibold mb-1">Đơn vị</label>
                    <select class="form-control" id="unit"></select>
                </div>
            </div>

            <div class="col-md-3 d-flex flex-column gap-2">
                <div>
                    <label class="form-label small fw-semibold mb-1">Giá nhập (đ)</label>
                    <input class="form-control money-input" id="cost" onkeyup="formatMoney(this)">
                </div>
                <div>
                    <label class="form-label small fw-semibold mb-1">Giá bán (đ)</label>
                    <input class="form-control money-input" id="price" onkeyup="formatMoney(this)">
                </div>
            </div>

            <div class="col-md-3 d-flex flex-column gap-2">
                <div>
                    <label class="form-label small fw-semibold mb-1">Số lượng tồn</label>
                    <input class="form-control text-center" type="number" id="stock">
                </div>
                <div class="d-flex flex-column gap-1 mt-auto">
                    <button class="btn btn-primary fw-bold" onclick="saveProduct()">Lưu sản phẩm</button>
                    <button class="btn btn-outline-secondary" onclick="clearForm()">Làm mới Form</button>
                </div>
            </div>
        </div>
    </div>
</div>

        <!-- DANH SÁCH SẢN PHẨM -->
        <div class="col-12">
            <div class="card p-4">

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold mb-0">Danh sách mặt hàng</h5>

                    <div style="width:420px;">
                        <div class="input-group">

                            <span class="input-group-text bg-white border-end-0">
                                <i class="fa-solid fa-magnifying-glass text-muted"></i>
                            </span>

                            <input 
                            class="form-control border-start-0 ps-0"
                            id="search"
                            placeholder="Quét barcode hoặc nhập..."
                            onkeyup="handleBarcode(event)"
                            autocomplete="off">

                            <button class="btn btn-outline-secondary" onclick="startCameraScan()">
                                <i class="fa-solid fa-camera"></i>
                            </button>

                            <button class="btn btn-outline-secondary" onclick="refreshProducts()">
                                <i class="fa-solid fa-rotate"></i>
                            </button>

                            <button class="btn btn-success ms-2" onclick="exportExcelMultiSheet()">
                                <i class="fa-solid fa-file-excel"></i> Xuất Excel
                            </button>

                        </div>

                        <!-- CAMERA SCANNER -->
                        <div id="scanner"></div>

                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                    <tr>
                    <th onclick="sortProducts('name')" style="cursor:pointer">
                    Sản phẩm <i class="fa fa-sort"></i>
                    </th>

                    <th>Danh mục</th>
                    <th>Đơn vị</th> 

                    <th onclick="sortProducts('barcode')" style="cursor:pointer">
                    Barcode <i class="fa fa-sort"></i>
                    </th>

                    <th onclick="sortProducts('costPrice')" style="cursor:pointer">
                    Giá nhập <i class="fa fa-sort"></i>
                    </th>

                    <th onclick="sortProducts('price')" style="cursor:pointer">
                    Giá bán <i class="fa fa-sort"></i>
                    </th>

                    <th onclick="sortProducts('price')" style="cursor:pointer">
                    Lợi nhuận <i class="fa fa-sort"></i>
                    </th>

                    <th onclick="sortProducts('stockQuantity')" style="cursor:pointer">
                    Tồn kho <i class="fa fa-sort"></i>
                    </th>

                    <th class="text-end">Hành động</th>
                    </tr>
                    </thead>
                        <tbody id="tableBody">
                            </tbody>
                    </table>
                    <div class="d-flex justify-content-between align-items-center mt-3">

                    <div class="text-muted small">
                        Hiển thị <span id="showing"></span> sản phẩm
                    </div>

                    <div>
                        <button class="btn btn-sm btn-light me-2" onclick="prevPage()">Previous</button>
                        <span id="pageInfo" class="fw-semibold"></span>
                        <button class="btn btn-sm btn-light ms-2" onclick="nextPage()">Next</button>
                    </div>

                </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/sidebar.js"></script>
<script src="/js/products.js"></script>
<script src="/js/auth.js"></script>
<script>
    // Ví dụ: Chỉ cho phép ADMIN vào trang này
    authGuard(["ADMIN"]); 
</script>
</body>
</html>
