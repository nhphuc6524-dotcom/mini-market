<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tồn kho</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/sidebar.css">

<style>

body{
background:#f8f9fa;
font-family:Inter,sans-serif;
}

.main-content{
margin-left:240px;
padding:30px;
}

.low-stock{
background:#ffebee;
color:#c62828;
font-weight:600;
}

</style>

</head>
<body>

<div id="sidebar"></div>

<div class="main-content">

<h3 class="fw-bold mb-4">
<i class="fa-solid fa-boxes-stacked"></i>
Quản lý tồn kho
</h3>

<div class="card p-4">

<div class="table-responsive">

<table class="table table-hover">

<thead>

<tr>
<th>ID</th>
<th>Sản phẩm</th>
<th>Barcode</th>
<th>Giá bán</th>
<th>Tồn kho</th>
<th>Min Stock</th>
<th>Trạng thái</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

</div>

<script>

function loadInventory(){

fetch("/api/inventory")
.then(res=>res.json())
.then(data=>{

let rows=""

data.forEach(p=>{

let status="OK"
let rowClass=""

if(p.stockQuantity <= p.minStock){

status="Sắp hết hàng"
rowClass="low-stock"

}

rows+=`

<tr class="${rowClass}">

<td>${p.id}</td>
<td>${p.name}</td>
<td>${p.barcode ?? ""}</td>
<td>${p.price}</td>
<td>${p.stockQuantity}</td>
<td>${p.minStock}</td>
<td>${status}</td>

</tr>

`

})

document.getElementById("tableBody").innerHTML = rows

})

}

loadInventory()

</script>

<script src="/js/sidebar.js"></script>


</body>
</html>
