<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Báo cáo doanh thu - MiniMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/css/sidebar.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #334155; }
        .main-content { margin-left: 240px; padding: 2rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .stat-card { transition: transform 0.2s; border-left: 5px solid #4f46e5; }
        .stat-card:hover { transform: translateY(-5px); }
        .card-header { background: white; font-weight: 700; border-bottom: 1px solid #f1f5f9; padding: 1.25rem; }
    </style>
</head>
<body>

<div id="sidebar"></div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Báo cáo & Thống kê</h3>
        <div class="d-flex gap-2">
            <button class="btn btn-white border shadow-sm btn-sm" onclick="location.reload()">
                <i class="fa-solid fa-sync me-1"></i> Làm mới dữ liệu
            </button>

            <button class="btn btn-success btn-sm" onclick="exportRevenueExcel()">
                <i class="fa-solid fa-file-excel me-1"></i> Xuất Excel
            </button>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card stat-card p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted small fw-bold mb-1">DOANH THU HÔM NAY</p>
                        <h3 class="fw-bold mb-0 text-primary" id="todayRevenue">0 đ</h3>
                    </div>
                    <div class="bg-primary-subtle p-3 rounded-circle">
                        <i class="fa-solid fa-sack-dollar fa-2x text-primary"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card p-3" style="border-left-color: #10b981;">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted small fw-bold mb-1">ĐƠN HÀNG MỚI</p>
                        <h3 class="fw-bold mb-0 text-success" id="orderCount">0</h3>
                    </div>
                    <div class="bg-success-subtle p-3 rounded-circle">
                        <i class="fa-solid fa-cart-shopping fa-2x text-success"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card p-3" style="border-left-color: #f59e0b;">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted small fw-bold mb-1">SẢN PHẨM SẮP HẾT</p>
                        <h3 class="fw-bold mb-0 text-warning" id="lowStockCount">0</h3>
                    </div>
                    <div class="bg-warning-subtle p-3 rounded-circle">
                        <i class="fa-solid fa-triangle-exclamation fa-2x text-warning"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-8">
            <div class="card h-100">
                <div class="d-flex justify-content-between align-items-center mb-3">

                <div>
                <select id="reportType" class="form-select form-select-sm">
                <option value="day">Theo ngày (7 ngày)</option>
                <option value="month">Theo tháng (12 tháng)</option>
                </select>
                </div>

                </div>
                <div class="card-header">
                    <i class="fa-solid fa-chart-line me-2 text-primary"></i>Biểu đồ doanh thu 7 ngày qua
                </div>
                <div class="card-body">
                    <canvas id="revenueChart" height="280"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-header">
                    <i class="fa-solid fa-trophy me-2 text-warning"></i>Top sản phẩm bán chạy
                </div>
                <div class="card-body p-0">
                    <ul id="topProducts" class="list-group list-group-flush">
                        </ul>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="/js/sidebar.js"></script>
<script>
let revenueData = []

let chart;

// load khi trang mở
document.addEventListener("DOMContentLoaded", function(){

    loadTodayStats();
    loadRevenue();
    loadTopProducts();

});

// đổi loại báo cáo
document.getElementById("reportType")
.addEventListener("change", loadRevenue);


// =======================
// Thống kê hôm nay
// =======================

function loadTodayStats(){

fetch("/api/reports/today")
.then(res=>res.json())
.then(data=>{

document.getElementById("todayRevenue").innerText =
Number(data.revenue).toLocaleString("vi-VN") + " đ"

document.getElementById("orderCount").innerText =
data.orderCount || 0

document.getElementById("lowStockCount").innerText =
data.lowStockCount || 0

})

}


// =======================
// Biểu đồ doanh thu
// =======================

function loadRevenue(){

let type = document.getElementById("reportType").value

fetch("/api/reports/revenue?type=" + type)
.then(res=>res.json())
.then(data=>{
revenueData = data
let labels = data.map(d=>d.label)
let values = data.map(d=>d.revenue)

// xoá chart cũ
if(chart){
chart.destroy()
}

chart = new Chart(
document.getElementById("revenueChart"),
{
type:"line",

data:{
labels:labels,

datasets:[{

label:"Doanh thu (VND)",
data:values,

borderColor:"#4f46e5",
backgroundColor:"rgba(79,70,229,0.1)",
fill:true,
tension:0.4

}]

},

options:{

responsive:true,
maintainAspectRatio:false,

plugins:{
legend:{display:false}
},

scales:{
y:{
beginAtZero:true
},
x:{
grid:{display:false}
}
}

}

})

})

}


// =======================
// Top sản phẩm
// =======================

function loadTopProducts(){

fetch("/api/reports/top-products")
.then(res=>res.json())
.then(data=>{

let list=document.getElementById("topProducts")

list.innerHTML = data.map((p,index)=>`

<li class="list-group-item d-flex justify-content-between align-items-center py-3">

<div>

<span class="badge bg-light text-dark border me-2">
${index+1}
</span>

<span class="fw-semibold">
${p.name}
</span>

</div>

<span class="badge bg-primary-subtle text-primary rounded-pill px-3">

${p.total_sold} món

</span>

</li>

`).join("")

})

}

async function exportRevenueExcel(){

try{

// gọi API
let revenueRes = await fetch("/api/reports/revenue?type=" + document.getElementById("reportType").value)
let revenue = await revenueRes.json()

let topRes = await fetch("/api/reports/top-products")
let topProducts = await topRes.json()

let todayRes = await fetch("/api/reports/today")
let today = await todayRes.json()


const wb = XLSX.utils.book_new()


// ==========================
// Sheet 1 - Doanh thu
// ==========================

let revenueSheet = [
["Thời gian","Doanh thu (VND)"]
]

revenue.forEach(r=>{
revenueSheet.push([
r.label,
r.revenue
])
})

let ws1 = XLSX.utils.aoa_to_sheet(revenueSheet)

ws1['!cols'] = [
{wch:20},
{wch:20}
]

XLSX.utils.book_append_sheet(wb, ws1, "📈 Doanh thu")



// ==========================
// Sheet 2 - Top sản phẩm
// ==========================

let topSheet = [
["STT","Tên sản phẩm","Số lượng bán"]
]

topProducts.forEach((p,index)=>{
topSheet.push([
index+1,
p.name,
p.total_sold
])
})

let ws2 = XLSX.utils.aoa_to_sheet(topSheet)

ws2['!cols'] = [
{wch:10},
{wch:30},
{wch:20}
]

XLSX.utils.book_append_sheet(wb, ws2, "🏆 Top sản phẩm")



// ==========================
// Sheet 3 - Thống kê hôm nay
// ==========================

let todaySheet = [

["Chỉ số","Giá trị"],

["Doanh thu hôm nay", today.revenue || 0],

["Đơn hàng mới", today.orderCount || 0],

["Sản phẩm sắp hết", today.lowStockCount || 0]

]

let ws3 = XLSX.utils.aoa_to_sheet(todaySheet)

ws3['!cols'] = [
{wch:25},
{wch:20}
]

XLSX.utils.book_append_sheet(wb, ws3, "📊 Thống kê hôm nay")



// ==========================
// Xuất file
// ==========================

XLSX.writeFile(wb,"BaoCaoMiniMarket.xlsx")

}catch(e){

console.error(e)
alert("Lỗi khi xuất Excel")

}

}
</script>

</body>
</html>
