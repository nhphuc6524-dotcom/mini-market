<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - MiniMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/css/sidebar.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #334155; }
        .main-content { margin-left: 240px; padding: 2rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .stat-card { transition: transform 0.2s; border-left: 5px solid #4f46e5; }
        .stat-card:hover { transform: translateY(-5px); }
        .card-header { background: white; font-weight: 700; border-bottom: 1px solid #f1f5f9; padding: 1.25rem; }
        .bg-purple-subtle { background-color: #f3e8ff; }
        .text-purple { color: #8b5cf6; }
    </style>
</head>
<body>

<div id="sidebar"></div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Dashboard</h3>
        <div class="d-flex gap-2">
            <button class="btn btn-white border shadow-sm btn-sm" onclick="location.reload()">
                <i class="fa-solid fa-sync me-1"></i> Làm mới
            </button>
            <button class="btn btn-success btn-sm" onclick="exportRevenueExcel()">
                <i class="fa-solid fa-file-excel me-1"></i> Xuất Excel
            </button>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card stat-card p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted small fw-bold mb-1">DOANH THU</p>
                        <h3 class="fw-bold mb-0 text-primary" id="todayRevenue">0 đ</h3>
                    </div>
                    <div class="bg-primary-subtle p-3 rounded-circle">
                        <i class="fa-solid fa-sack-dollar fa-2x text-primary"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card p-3" style="border-left-color: #8b5cf6;">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted small fw-bold mb-1">LỢI NHUẬN</p>
                        <h3 class="fw-bold mb-0 text-purple" id="todayProfit">0 đ</h3>
                    </div>
                    <div class="bg-purple-subtle p-3 rounded-circle">
                        <i class="fa-solid fa-chart-line fa-2x text-purple"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card p-3" style="border-left-color: #10b981;">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted small fw-bold mb-1">ĐƠN HÀNG</p>
                        <h3 class="fw-bold mb-0 text-success" id="orderCount">0</h3>
                    </div>
                    <div class="bg-success-subtle p-3 rounded-circle">
                        <i class="fa-solid fa-cart-shopping fa-2x text-success"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card p-3" style="border-left-color: #f59e0b;">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted small fw-bold mb-1">SẮP HẾT HÀNG</p>
                        <h3 class="fw-bold mb-0 text-warning" id="lowStockCount">0</h3>
                    </div>
                    <div class="bg-warning-subtle p-3 rounded-circle">
                        <i class="fa-solid fa-triangle-exclamation fa-2x text-warning"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-8">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="fa-solid fa-chart-area me-2 text-primary"></i>Biểu đồ tăng trưởng</span>
                    <select id="reportType" class="form-select form-select-sm" style="width: auto;">
                        <option value="day">Theo ngày (7 ngày)</option>
                        <option value="month">Theo tháng (12 tháng)</option>
                    </select>
                </div>
                <div class="card-body">
                    <canvas id="revenueChart" height="280" style="filter: drop-shadow(0px 10px 8px rgba(0,0,0,0.02));"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-header">
                    <i class="fa-solid fa-trophy me-2 text-warning"></i>Top sản phẩm & Lợi nhuận
                </div>
                <div class="card-body p-0">
                    <ul id="topProducts" class="list-group list-group-flush"></ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/sidebar.js"></script>
<script>
let chart;

document.addEventListener("DOMContentLoaded", function(){
    loadTodayStats();
    loadRevenue();
    loadTopProducts();
});

document.getElementById("reportType").addEventListener("change", loadRevenue);

function loadTodayStats(){
    fetch("/api/reports/today")
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("todayRevenue").innerText = Number(data.revenue || 0).toLocaleString("vi-VN") + " đ";
        document.getElementById("todayProfit").innerText = Number(data.profit || 0).toLocaleString("vi-VN") + " đ";
        document.getElementById("orderCount").innerText = data.orderCount || 0;
        document.getElementById("lowStockCount").innerText = data.lowStockCount || 0;
    });
}

function loadRevenue(){
    let type = document.getElementById("reportType").value;
    fetch("/api/reports/revenue?type=" + type)
    .then(res=>res.json())
    .then(data=>{
        let labels = data.map(d=>d.label);
        let revenues = data.map(d=>d.revenue);
        let profits = data.map(d=>d.profit || 0);

        if(chart) chart.destroy();

        chart = new Chart(document.getElementById("revenueChart"), {
            type: "bar", // Chuyển sang biểu đồ cột
            data: {
                labels: labels,
                datasets: [
                    {
                        label: "Lợi nhuận",
                        data: profits,
                        backgroundColor: "#10b981", // Màu xanh lá cho lợi nhuận
                        borderRadius: 5,
                        order: 1
                    },
                    {
                        label: "Doanh thu",
                        data: revenues,
                        backgroundColor: "#e2e8f0", // Màu xám nhạt cho doanh thu (nền)
                        borderRadius: 5,
                        order: 2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: true, position: 'top' },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) label += ': ';
                                if (context.parsed.y !== null) {
                                    label += new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(context.parsed.y);
                                }
                                return label;
                            }
                        }
                    }
                },
                scales: { 
                    y: { 
                        beginAtZero: true,
                        stacked: false, // Để cột đè lên nhau hoặc đứng cạnh nhau
                        grid: { borderDash: [5, 5] }
                    },
                    x: { 
                        stacked: true, // Chồng lợi nhuận lên doanh thu để thấy tỷ lệ
                        grid: { display: false } 
                    } 
                }
            }
        });
    });
}

function loadTopProducts(){
    fetch("/api/reports/top-products")
    .then(res=>res.json())
    .then(data=>{
        let list = document.getElementById("topProducts");
        list.innerHTML = data.map((p, index) => `
            <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                <div>
                    <span class="badge bg-light text-dark border me-2">${index + 1}</span>
                    <span class="fw-semibold">${p.name}</span>
                    <div class="small text-success mt-1">Lãi: ${Number(p.total_profit || 0).toLocaleString("vi-VN")} đ</div>
                </div>
                <span class="badge bg-primary-subtle text-primary rounded-pill px-3">
                    ${p.total_sold} món
                </span>
            </li>
        `).join("");
    });
}

async function exportRevenueExcel(){
    try {
        let type = document.getElementById("reportType").value;
        let [rev, top, today] = await Promise.all([
            fetch(`/api/reports/revenue?type=${type}`).then(res => res.json()),
            fetch("/api/reports/top-products").then(res => res.json()),
            fetch("/api/reports/today").then(res => res.json())
        ]);

        const wb = XLSX.utils.book_new();

        // Sheet Doanh thu chi tiết
        let revSheet = [["Thời gian", "Doanh thu (VND)", "Lợi nhuận (VND)"]];
        rev.forEach(r => revSheet.push([r.label, r.revenue, r.profit || 0]));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(revSheet), "Doanh thu");

        // Sheet Top sản phẩm
        let topSheet = [["STT", "Sản phẩm", "Số lượng bán", "Tổng lợi nhuận (VND)"]];
        top.forEach((p, i) => topSheet.push([i+1, p.name, p.total_sold, p.total_profit || 0]));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(topSheet), "Top sản phẩm");

        XLSX.writeFile(wb, "BaoCao_MiniMarket_Full.xlsx");
    } catch(e) {
        alert("Lỗi xuất file!");
    }
}
</script>
</body>
</html>
