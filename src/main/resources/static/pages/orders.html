<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Hóa đơn - Mini Supermarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/sidebar.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .main-content { margin-left: 240px; padding: 2rem; }
    
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); height: 100%; }
        .card-header { background-color: white; border-bottom: 1px solid #f1f5f9; padding: 1.25rem; border-radius: 12px 12px 0 0 !important; }
        
        .table thead { background-color: #f8fafc; }
        .table-hover tbody tr { cursor: pointer; transition: 0.2s; }
        .table-hover tbody tr:hover { background-color: #f1f5f9; }
        
        .order-id { font-weight: 600; color: #4f46e5; }
        .price-text { font-weight: 600; color: #0f172a; }
        .total-section { background: #f8fafc; border-radius: 8px; padding: 15px; margin-top: 20px; }
        
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; background: #dcfce7; color: #15803d; }
        .pagination .page-link{
            border-radius:8px;
            margin:0 3px;
        }
    </style>
</head>
<body>

<div id="sidebar"></div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-dark">Lịch sử giao dịch</h3>
        <button class="btn btn-white border shadow-sm" onclick="loadOrders()">
            <i class="fa-solid fa-rotate me-1"></i> Làm mới
        </button>
    </div>

    <div class="row g-4">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0 fw-bold"><i class="fa-solid fa-list me-2 text-primary"></i>Danh sách đơn</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                            <tr>
                            <th class="ps-4">Mã đơn</th>
                            <th>Thời gian</th>
                            <th class="text-end">Tổng tiền</th>
                            <th class="text-center">Xóa</th>
                            </tr>
                            </thead>
                            <tbody id="ordersTable">
                                </tbody>
                        </table>
                    </div>
                    <div class="p-3">
                        <nav>
                            <ul class="pagination justify-content-center" id="pagination"></ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold"><i class="fa-solid fa-circle-info me-2 text-info"></i>Chi tiết hóa đơn</h5>
                    <span id="orderLabel" class="status-badge" style="display: none;">Hoàn thành</span>
                </div>
                <div class="card-body">
                    <div id="placeholderText" class="text-center py-5 text-muted">
                        <i class="fa-solid fa-receipt fa-3x mb-3 opacity-25"></i>
                        <p>Chọn một hóa đơn để xem chi tiết</p>
                    </div>
                    
                    <div id="detailContent" style="display: none;">
                        <table class="table align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Sản phẩm</th>
                                    <th class="text-center">Đơn giá</th>
                                    <th class="text-center">Số lượng</th>
                                    <th class="text-end">Thành tiền</th>
                                </tr>
                            </thead>
                            <tbody id="itemsTable"></tbody>
                        </table>

                        <div class="total-section">

                        <div class="d-flex justify-content-between">
                        <span>Tạm tính</span>
                        <span id="subTotal"></span>
                        </div>

                        <div class="d-flex justify-content-between text-danger">
                        <span>Giảm giá</span>
                        <span id="discountAmount"></span>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between fw-bold fs-5">
                        <span>Thanh toán</span>
                        <span id="totalAmount"></span>
                        </div>
                        <div class="d-flex justify-content-between mt-2">
                        <span>Phương thức</span>
                        <span id="paymentMethod"></span>
                        </div>

                        </div>

                        
                        
                        <div class="mt-4 d-flex gap-2">
                            <button class="btn btn-outline-dark btn-sm"><i class="fa-solid fa-print me-1"></i> In hóa đơn</button>
                            <button class="btn btn-outline-secondary btn-sm"><i class="fa-solid fa-share me-1"></i> Xuất PDF</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const orderApi = "/api/orders";

    let currentPage = 0;
const pageSize = 8;

function loadOrders(page = 0){

    currentPage = page;

    fetch(`${orderApi}?page=${page}&size=${pageSize}`)
    .then(res => res.json())
    .then(data => {

        let rows = "";

        data.content.forEach(o => {

            const date = new Date(o.orderDate).toLocaleString('vi-VN');

            rows += `
            <tr>
                <td class="ps-4" onclick="viewOrder(${o.id})">
                    <span class="order-id">#ORD-${o.id}</span>
                </td>

                <td class="small text-muted" onclick="viewOrder(${o.id})">
                    ${date}
                </td>

                <td class="text-end price-text" onclick="viewOrder(${o.id})">
                    ${Number(o.total).toLocaleString("vi-VN")} đ
                </td>

                <td class="text-center">
                    <button class="btn btn-sm btn-danger" onclick="deleteOrder(${o.id})">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </td>
            </tr>
            `;
        });

        document.getElementById("ordersTable").innerHTML = rows;

        renderPagination(data.totalPages);

    });

}

    function viewOrder(id) {

document.getElementById("placeholderText").style.display = "none";
document.getElementById("detailContent").style.display = "block";
document.getElementById("orderLabel").style.display = "inline-block";
document.getElementById("orderLabel").innerText = "Đơn hàng #ORD-" + id;

Promise.all([
    fetch(`${orderApi}/${id}`).then(res=>res.json()),
    fetch(`${orderApi}/${id}/items`).then(res=>res.json())
])
.then(([order,items])=>{

let rows = "";
let subtotal = 0;

items.forEach(i=>{

let sub = i.price * i.quantity;

subtotal += sub;

rows += `
<tr>
<td class="fw-medium">${i.productName}</td>
<td class="text-center">${i.price.toLocaleString()}</td>
<td class="text-center">
<span class="badge bg-light text-dark border">${i.quantity}</span>
</td>
<td class="text-end fw-bold text-dark">${sub.toLocaleString()} đ</td>
</tr>
`;

});

document.getElementById("itemsTable").innerHTML = rows;

let discount = order.discount || 0;

document.getElementById("subTotal").innerText =
subtotal.toLocaleString("vi-VN") + " đ";

document.getElementById("discountAmount").innerText =
"-" + discount.toLocaleString("vi-VN") + " đ";

document.getElementById("totalAmount").innerText =
Number(order.total).toLocaleString("vi-VN") + " đ";
    
document.getElementById("paymentMethod").innerText =
order.paymentMethod || "CASH";
});
}

    function renderPagination(totalPages){

    let html = ""

    const maxPages = 5 // số trang hiển thị tối đa
    let start = Math.max(0, currentPage - Math.floor(maxPages/2))
    let end = start + maxPages

    if(end > totalPages){
        end = totalPages
        start = Math.max(0, end - maxPages)
    }

    // previous
    html += `
    <li class="page-item ${currentPage===0?'disabled':''}">
        <button class="page-link" onclick="loadOrders(${currentPage-1})">
            &laquo;
        </button>
    </li>
    `

    // trang đầu
    if(start > 0){
        html += `
        <li class="page-item">
            <button class="page-link" onclick="loadOrders(0)">1</button>
        </li>
        `

        if(start > 1){
            html += `<li class="page-item disabled"><span class="page-link">...</span></li>`
        }
    }

    // các trang giữa
    for(let i=start;i<end;i++){
        html += `
        <li class="page-item ${i===currentPage?'active':''}">
            <button class="page-link" onclick="loadOrders(${i})">
                ${i+1}
            </button>
        </li>
        `
    }

    // trang cuối
    if(end < totalPages){
        if(end < totalPages-1){
            html += `<li class="page-item disabled"><span class="page-link">...</span></li>`
        }

        html += `
        <li class="page-item">
            <button class="page-link" onclick="loadOrders(${totalPages-1})">
                ${totalPages}
            </button>
        </li>
        `
    }

    // next
    html += `
    <li class="page-item ${currentPage===totalPages-1?'disabled':''}">
        <button class="page-link" onclick="loadOrders(${currentPage+1})">
            &raquo;
        </button>
    </li>
    `

    document.getElementById("pagination").innerHTML = html
}

    loadOrders();
</script>
<script src="/js/sidebar.js"></script>

<script>


function deleteOrder(id){

if(!confirm("Bạn có chắc muốn xóa hóa đơn #" + id + "?")){
return
}

fetch(orderApi + "/" + id,{
method:"DELETE"
})
.then(()=>{
loadOrders()

document.getElementById("itemsTable").innerHTML = ""
document.getElementById("totalAmount").innerText = "0 VND"
})

}
</script>
</body>
</html>
