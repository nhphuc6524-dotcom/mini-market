<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>POS - Siêu thị Mini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
body { 
    background: #f0f2f5; 
    font-family: 'Inter', sans-serif; 
    overflow: hidden; 
}

.main { 
    margin-left: 0; 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
}

/* Khu vực quét mã */
.scan-section { 
    background: #ffffff; 
    padding: 25px; 
    border-bottom: 2px solid #e2e8f0; 
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
#barcodeInput { 
    height: 60px; 
    font-size: 1.4rem; 
    font-weight: 600;
    border: 2px solid #4f46e5; 
    border-radius: 15px;
    background: #f8faff;
    transition: 0.2s all;
}
#barcodeInput:focus {
    border-color: #6366f1;
    box-shadow: 0 0 8px rgba(99,102,241,0.3);
}

/* Nút quét */
.btn-primary, .btn-danger {
    border-radius: 12px;
    height: 60px;
    font-weight: 600;
    transition: 0.2s all;
}
.btn-primary:hover {
    background: #6366f1;
}

/* Giỏ hàng */
.cart-container { 
    flex: 1; 
    overflow-y: auto; 
    padding: 20px; 
}
.card { 
    border: none; 
    border-radius: 20px; 
    box-shadow: 0 8px 15px rgba(0,0,0,0.08); 
}
.table thead { 
    position: sticky; 
    top: 0; 
    background: #f9fafb; 
    z-index: 10; 
}
.table tbody tr:hover {
    background: #f3f4f6;
    transition: 0.2s background;
}

/* Thanh toán bên phải */
.summary-card { 
    background: linear-gradient(145deg,#1e293b,#334155); 
    color: white; 
    height: 100%; 
    border-radius: 20px; 
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 30px;
}
.total-label { 
    font-size: 1.2rem; 
    color: #cbd5e1; 
    letter-spacing: 1px;
}
.total-amount { 
    font-size: 3rem; 
    font-weight: 800; 
    color: #22c55e; 
}

/* Nút thanh toán & hủy đơn */
.btn-checkout { 
    height: 80px; 
    font-size: 1.5rem; 
    font-weight: bold; 
    border-radius: 15px;
    background: #22c55e;
    border: none;
    transition: 0.2s all;
}
.btn-checkout:hover {
    background: #16a34a;
}

.qty-btn { 
    width: 35px; 
    height: 35px; 
    display: inline-flex; 
    align-items: center; 
    justify-content: center; 
    border-radius: 8px; 
    transition: 0.2s all;
}
.qty-btn:hover {
    background: #e5e7eb;
}

#emptyCart i {
    color: #cbd5e1;
}

</style>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<div class="main">
    <div class="scan-section">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-barcode fa-2x text-muted"></i></span>
                        <input class="form-control border-start-0" id="barcodeInput" 
                               placeholder="Sẵn sàng quét mã (Enter để thêm)..." 
                               onkeypress="scanBarcode(event)" autofocus>
                        <button class="btn btn-primary ms-2" onclick="startScanner()">
                        <i class="fa-solid fa-camera"></i> Mở Camera
                        </button>

                        <button class="btn btn-danger ms-2" onclick="stopScanner()">
                        <i class="fa-solid fa-video-slash"></i> Tắt
                        </button>
                    </div>
                    <div id="reader" style="width:400px; margin-top:10px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-0 flex-grow-1">
        <div class="col-md-8 cart-container">
            <div class="card h-100">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr class="py-3">
                                <th class="ps-4">Sản phẩm</th>
                                <th class="text-center">Giá</th>
                                <th class="text-center" style="width: 150px;">Số lượng</th>
                                <th class="text-end">Thành tiền</th>
                                <th class="text-center"></th>
                            </tr>
                        </thead>
                        <tbody id="cartTable"></tbody>
                    </table>
                    
                    <div id="emptyCart" class="text-center py-5">
                        <i class="fa-solid fa-cart-plus fa-4x mb-3 text-light"></i>
                        <p class="text-muted">Chưa có sản phẩm nào trong giỏ</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card summary-card p-4 d-flex flex-column justify-content-between">
                <div>
                    <h5 class="text-uppercase tracking-wider mb-4">Chi tiết thanh toán</h5>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-muted">Số lượng món:</span>
                        <span id="itemCount" class="fw-bold">0</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-muted">Thuế (0%):</span>
                        <span class="fw-bold">0 đ</span>
                    </div>
                    <hr class="opacity-10">
                    <div class="py-3">
                        <span class="total-label">TỔNG CỘNG</span>
                        <div class="total-amount"><span id="totalPrice">0</span> <small style="font-size: 1.5rem">đ</small></div>
                    </div>
                </div>

                <div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">Khách đưa:</label>
                        <input type="number" class="form-control form-control-lg bg-dark text-white border-secondary" placeholder="0">
                    </div>
                    <button class="btn btn-success w-100 btn-checkout mb-3" onclick="checkout()">
                        <i class="fa-solid fa-print me-2"></i> THANH TOÁN
                    </button>
                    <button class="btn btn-outline-danger w-100" onclick="clearCart()">
                        Hủy đơn (F8)
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>

const productAPI = "/api/products/barcode/"
const orderAPI = "/api/orders"

let cart = []

function scanBarcode(e){

if(e.key !== "Enter") return

let barcode = document.getElementById("barcodeInput").value

fetch(productAPI + barcode)
.then(res=>res.json())
.then(product=>{

addToCart(product)

document.getElementById("barcodeInput").value=""

})

}

function addToCart(product){

let existing = cart.find(p=>p.id === product.id)

if(existing){

existing.qty++

}else{

cart.push({
id:product.id,
name:product.name,
price:product.price,
qty:1
})

}

renderCart()

}


    function renderCart(){
        let rows = "";
        let total = 0;
        let count = 0;

        if(cart.length > 0) document.getElementById("emptyCart").style.display = "none";
        else document.getElementById("emptyCart").style.display = "block";

        cart.forEach((p, index) => {
            let sub = p.price * p.qty;
            total += sub;
            count += p.qty;
            rows += `
            <tr>
                <td class="ps-4">
                    <div class="fw-bold text-dark">${p.name}</div>
                    <small class="text-muted">Barcode: ${p.barcode || 'N/A'}</small>
                </td>
                <td class="text-center fw-semibold text-secondary">${p.price.toLocaleString()}</td>
                <td class="text-center">
                    <div class="d-flex align-items-center justify-content-center gap-2">
                        <button class="btn btn-outline-secondary qty-btn" onclick="decrease(${index})">-</button>
                        <span class="fw-bold" style="min-width: 30px">${p.qty}</span>
                        <button class="btn btn-outline-secondary qty-btn" onclick="increase(${index})">+</button>
                    </div>
                </td>
                <td class="text-end fw-bold text-primary">${sub.toLocaleString()} đ</td>
                <td class="text-center pe-4">
                    <button class="btn btn-link text-danger p-0" onclick="removeItem(${index})">
                        <i class="fa-solid fa-circle-xmark fa-lg"></i>
                    </button>
                </td>
            </tr>`;
        });

        document.getElementById("cartTable").innerHTML = rows;
        document.getElementById("totalPrice").innerText = total.toLocaleString();
        document.getElementById("itemCount").innerText = count;
    }

    // Tích hợp phím tắt cho chuyên nghiệp
    document.addEventListener('keydown', (e) => {
        if(e.key === 'F8') clearCart();
        if(e.key === 'F9') checkout();
    });

    function clearCart() {
        if(confirm("Bạn có chắc muốn hủy giỏ hàng?")) {
            cart = [];
            renderCart();
        }
    }

function increase(i){

cart[i].qty++
renderCart()

}

function decrease(i){

if(cart[i].qty >1){
cart[i].qty--
}else{
cart.splice(i,1)
}

renderCart()

}

function removeItem(i){

cart.splice(i,1)
renderCart()

}

async function checkout(){

if(cart.length===0){
alert("Giỏ hàng trống")
return
}

let total = cart.reduce((sum,p)=> sum + p.price*p.qty ,0)

// tạo order
let res = await fetch(orderAPI,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
total:total
})
})

let order = await res.json()
let orderId = order.id

// lưu order items
for(let item of cart){

await fetch("/api/order-items",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
orderId:orderId,
productId:item.id,
price:item.price,
quantity:item.qty
})
})

}

alert("Thanh toán thành công - Order #" + order.id)

cart=[]
renderCart()

}

</script>
<script>
let scanner;
let scanLock = false;
let cameraRunning = false;

function startScanner(){

if(cameraRunning) return;

scanner = new Html5Qrcode("reader");

scanner.start(
{ facingMode: "environment" },
{
fps:10,
qrbox:{width:250,height:120},
aspectRatio:1.7
},
(barcode)=>{

if(scanLock) return
scanLock = true

barcode = barcode.trim()

console.log("Scanned:", barcode)

new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg").play()

document.getElementById("barcodeInput").value = barcode

fetch(productAPI + barcode)
.then(res=>{
if(!res.ok) throw new Error()
return res.json()
})
.then(product=>{

addToCart(product)

document.getElementById("barcodeInput").focus()

})
.catch(()=>{
alert("Không tìm thấy sản phẩm")
})

document.getElementById("barcodeInput").value=""

// mở lại scan sau 2 giây
setTimeout(()=>{
scanLock = false
},2000)

}
)

cameraRunning = true

}

function stopScanner(){

if(scanner && cameraRunning){

scanner.stop()
cameraRunning = false

}

}
</script>
</body>
</html>
