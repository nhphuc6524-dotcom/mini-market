<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Cài đặt - MiniMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/sidebar.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: #1e293b;
        }
        .main-content {
            margin-left: 240px;
            padding: 30px;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: 100%; /* Đảm bảo các card cao bằng nhau trong một hàng */
        }
        .section-title {
            font-weight: 600;
            margin-bottom: 20px;
        }
        .btn-primary {
            background-color: #4f46e5;
            border-color: #4f46e5;
            padding: 10px 25px;
            font-weight: 500;
        }
        .btn-primary:hover {
            background-color: #4338ca;
        }
    </style>
</head>

<body>

<div id="sidebar"></div>

<div class="main-content">
    <h3 class="fw-bold mb-4">
        <i class="fa-solid fa-gear me-2 text-secondary"></i>
        Cài đặt hệ thống
    </h3>

    <div class="row g-4">
        <div class="col-md-7">
            <div class="card p-4">
                <h5 class="section-title text-primary">
                    <i class="fa-solid fa-shop me-2"></i>
                    Thông tin cửa hàng
                </h5>
                
                <div class="mb-3">
                    <label class="form-label fw-medium">Tên cửa hàng</label>
                    <input type="text" class="form-control" id="storeName" placeholder="Nhập tên MiniMarket">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-medium">Địa chỉ</label>
                    <input type="text" class="form-control" id="storeAddress" placeholder="Địa chỉ cửa hàng">
                </div>

                <div class="mb-0">
                    <label class="form-label fw-medium">Số điện thoại</label>
                    <input type="text" class="form-control" id="storePhone" placeholder="Số điện thoại liên hệ">
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card p-4">
                <h5 class="section-title text-danger">
                    <i class="fa-solid fa-database me-2"></i>
                    An toàn dữ liệu
                </h5>
                <p class="text-muted small mb-4">
                    Tải về bản sao lưu toàn bộ cơ sở dữ liệu (SQL) để lưu trữ dự phòng. 
                    Khuyến khích thực hiện hàng tuần.
                </p>
                <div class="d-grid">
                    <button class="btn btn-outline-danger py-2" onclick="backupDatabase()">
                        <i class="fa-solid fa-download me-2"></i>
                        Tải bản Backup (.sql)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <button class="btn btn-primary" onclick="saveSettings()">
            <i class="fa-solid fa-floppy-disk me-2"></i>
            Lưu thay đổi
        </button>
    </div>
</div>

<script src="/js/sidebar.js"></script>

<script>
    const api = "/api/settings";

    // Load dữ liệu khi vào trang
    function loadSettings() {
        fetch(api)
        .then(res => {
            if (!res.ok) throw new Error("Không thể tải cài đặt");
            return res.json();
        })
        .then(s => {
            // Chỉ gán giá trị cho các ID tồn tại
            if (document.getElementById("storeName")) document.getElementById("storeName").value = s.storeName || "";
            if (document.getElementById("storeAddress")) document.getElementById("storeAddress").value = s.storeAddress || "";
            if (document.getElementById("storePhone")) document.getElementById("storePhone").value = s.storePhone || "";
        })
        .catch(err => console.error("Lỗi:", err));
    }

    // Lưu thông tin
    function saveSettings() {
        let data = {
            storeName: document.getElementById("storeName").value,
            storeAddress: document.getElementById("storeAddress").value,
            storePhone: document.getElementById("storePhone").value
        };

        fetch(api + "/1", {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        })
        .then(res => {
            if (res.ok) {
                alert("✅ Đã cập nhật thông tin cửa hàng thành công!");
            } else {
                alert("❌ Có lỗi xảy ra khi lưu.");
            }
        })
        .catch(err => alert("Lỗi kết nối server"));
    }

    // Tải file backup
    function backupDatabase() {
        const btn = event.currentTarget;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Đang xử lý...';

        fetch("/api/backup")
        .then(res => {
            if (!res.ok) throw new Error("Backup thất bại");
            return res.blob();
        })
        .then(blob => {
            let url = window.URL.createObjectURL(blob);
            let a = document.createElement("a");
            const now = new Date().toISOString().split('T')[0];
            a.href = url;
            a.download = `backup_minimarket_${now}.sql`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);
        })
        .catch(err => alert("Lỗi khi tải file backup: " + err.message))
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-download me-2"></i> Tải bản Backup (.sql)';
        });
    }

    loadSettings();
</script>
<script src="/js/auth.js"></script>
<script>
    // Ví dụ: Chỉ cho phép ADMIN vào trang này
    authGuard(["ADMIN"]); 
</script>
</body>
</html>
