<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý tài khoản - MiniMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/sidebar.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: #1e293b;
        }
        .main-content {
            margin-left: 240px;
            padding: 30px;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .table thead th {
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            color: #64748b;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }
        .badge-admin { background-color: #4f46e5; }
        .badge-cashier { background-color: #10b981; }
        .btn-action {
            width: 32px;
            height: 32px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div id="sidebar"></div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0">
            <i class="fa-solid fa-users-gear me-2 text-secondary"></i>
            Quản lý tài khoản
        </h3>
        <button class="btn btn-primary px-4 shadow-sm" onclick="openModal()">
            <i class="fa-solid fa-plus me-2"></i>Thêm nhân viên
        </button>
    </div>

    <div class="card overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th class="ps-4">Tên đăng nhập</th>
                        <th>Họ và tên</th>
                        <th>Vai trò</th>
                        <th>Trạng thái</th>
                        <th class="text-end pe-4">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-bottom-0">
                <h5 class="modal-title fw-bold" id="modalTitle">Thêm tài khoản mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="userId">
                    <div class="mb-3">
                        <label class="form-label fw-medium">Tên đăng nhập</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Họ và tên nhân viên</label>
                        <input type="text" class="form-control" id="fullName" required>
                    </div>
                    <div class="mb-3" id="passwordGroup">
                        <label class="form-label fw-medium">Mật khẩu</label>
                        <input type="password" class="form-control" id="password">
                        <small class="text-muted" id="pwNote">Để trống nếu không muốn đổi mật khẩu</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Vai trò</label>
                        <select class="form-select" id="role">
                            <option value="CASHIER">Thu ngân (Cashier)</option>
                            <option value="ADMIN">Quản trị viên (Admin)</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0">
                <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-primary px-4" onclick="saveUser()">Lưu thông tin</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/sidebar.js"></script>

<script>
    const api = "/api/users";
    let userModal;

    document.addEventListener("DOMContentLoaded", () => {
        userModal = new bootstrap.Modal(document.getElementById('userModal'));
        loadUsers();
    });

    function loadUsers() {
        fetch(api)
            .then(res => res.json())
            .then(users => {
                let html = "";
                users.forEach(u => {
                    html += `
                        <tr>
                            <td class="ps-4 fw-bold text-dark">${u.username}</td>
                            <td>${u.fullName || '---'}</td>
                            <td>
                                <span class="badge ${u.role === 'ADMIN' ? 'badge-admin' : 'badge-cashier'}">
                                    ${u.role}
                                </span>
                            </td>
                            <td><span class="badge bg-success">Đang hoạt động</span></td>
                            <td class="text-end pe-4">
                                <button class="btn btn-outline-primary btn-action me-1" onclick="editUser('${u.username}')">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button class="btn btn-outline-danger btn-action" onclick="deleteUser('${u.username}')">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
                document.getElementById("userTableBody").innerHTML = html;
            })
            .catch(err => console.error("Lỗi load users:", err));
    }

    function openModal() {
        document.getElementById("userForm").reset();
        document.getElementById("userId").value = "";
        document.getElementById("modalTitle").innerText = "Thêm tài khoản mới";
        document.getElementById("username").disabled = false;
        document.getElementById("pwNote").style.display = "none";
        userModal.show();
    }

    function editUser(username) {
        fetch(`${api}/${username}`)
            .then(res => res.json())
            .then(u => {
                document.getElementById("userId").value = u.username;
                document.getElementById("username").value = u.username;
                document.getElementById("username").disabled = true;
                document.getElementById("fullName").value = u.fullName;
                document.getElementById("role").value = u.role;
                document.getElementById("modalTitle").innerText = "Chỉnh sửa tài khoản";
                document.getElementById("pwNote").style.display = "block";
                userModal.show();
            });
    }

    function saveUser() {
        const id = document.getElementById("userId").value;
        const data = {
            username: document.getElementById("username").value,
            fullName: document.getElementById("fullName").value,
            role: document.getElementById("role").value
        };
        
        const pw = document.getElementById("password").value;
        if(pw) data.password = pw;

        const method = id ? "PUT" : "POST";
        const url = id ? `${api}/${id}` : api;

        fetch(url, {
            method: method,
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        })
        .then(res => {
            if(res.ok) {
                userModal.hide();
                loadUsers();
            } else {
                alert("❌ Lỗi: Không thể lưu thông tin nhân viên.");
            }
        });
    }

    function deleteUser(username) {
        if(confirm(`Bạn có chắc muốn xóa tài khoản [${username}]?`)) {
            fetch(`${api}/${username}`, { method: "DELETE" })
                .then(res => {
                    if(res.ok) loadUsers();
                    else alert("❌ Không thể xóa tài khoản này.");
                });
        }
    }
</script>
<script src="/js/auth.js"></script>
<script>
    // Ví dụ: Chỉ cho phép ADMIN vào trang này
    authGuard(["ADMIN"]); 
</script>
</body>
</html>
