<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Mini Market POS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            transition: transform 0.3s ease;
        }

        .brand-logo {
            width: 64px;
            height: 64px;
            background: var(--primary-color);
            color: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .login-header h3 {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }

        .input-group-text {
            background: #f8fafc;
            border-right: none;
            color: #94a3b8;
            border-radius: 12px 0 0 12px;
        }

        .form-control {
            border-left: none;
            border-radius: 0 12px 12px 0;
            padding: 12px;
            background: #f8fafc;
            border-color: #e2e8f0;
        }

        .form-control:focus {
            background: white;
            border-color: var(--primary-color);
            box-shadow: none;
        }

        .btn-login {
            background: var(--primary-color);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            font-size: 16px;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: #4338ca;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-login:disabled {
            background: #94a3b8;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center login-header">
        <div class="brand-logo">
            <i class="fa-solid fa-shop"></i>
        </div>
        <h3>Chào mừng trở lại!</h3>
        <p>Vui lòng đăng nhập để quản lý hệ thống</p>
    </div>

    <div class="mb-3">
        <label class="form-label">TÀI KHOẢN</label>
        <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
            <input type="text" class="form-control" id="username" placeholder="Nhập username" autofocus>
        </div>
    </div>

    <div class="mb-4">
        <label class="form-label">MẬT KHẨU</label>
        <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu">
        </div>
    </div>

    <button id="btnLogin" class="btn btn-primary w-100 btn-login" onclick="login()">
        Đăng nhập ngay
    </button>
    
    <div class="text-center mt-4">
        <small class="text-muted">Hệ thống quản lý nội bộ Mini Market</small>
    </div>
</div>

<script>
    // Kiểm tra login trạng thái
    if(localStorage.getItem("user")){
        window.location.href="/pages/index.html";
    }

    async function login() {
    const btn = document.getElementById("btnLogin");
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        alert("Vui lòng điền đầy đủ thông tin!");
        return;
    }

    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Đang xử lý...';
    btn.disabled = true;

    try {
        const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.error || "Sai tài khoản hoặc mật khẩu");
        }

        // Lưu thông tin user vào localStorage
        localStorage.setItem("user", JSON.stringify({
            id: data.id,
            username: data.username,
            role: data.role
        }));

        // Điều hướng sau khi thành công
        window.location.href = "/pages/index.html";
    } catch (err) {
        alert(err.message);
    } finally {
        btn.innerText = "Đăng nhập ngay";
        btn.disabled = false;
    }
}

    // Lắng nghe phím Enter
    document.addEventListener("keydown", e => {
        if(e.key === "Enter") login();
    });
</script>

</body>
</html>
